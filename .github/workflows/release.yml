name: Build desktop apps

# Builds the single-file siliqs-mesh-bridge desktop app for Windows / macOS / Linux.
# - push a tag  v*   → builds all three and attaches them to a GitHub Release
# - manual run  (workflow_dispatch) → builds all three, uploads as workflow artifacts
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/attach the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: siliqs-mesh-bridge-linux-x86_64
            bin: siliqs-mesh-bridge
          - os: windows-latest
            asset: siliqs-mesh-bridge-windows-x86_64.exe
            bin: siliqs-mesh-bridge.exe
          - os: macos-latest
            asset: siliqs-mesh-bridge-macos-arm64.dmg
            bin: siliqs-mesh-bridge
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install "." pyinstaller

      - name: Build
        run: pyinstaller --noconfirm siliqs-mesh-bridge.spec

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "macOS" ]; then
            # Build a .dmg with the classic drag-to-Applications layout. hdiutil (no
            # Finder/AppleScript) is reliable on the headless CI runner: a staging folder
            # holding the .app + an "Applications" symlink → a compressed (UDZO) image.
            staging="$(mktemp -d)"
            cp -R "dist/siliqs-mesh-bridge.app" "$staging/"
            ln -s /Applications "$staging/Applications"
            hdiutil create -volname "Siliqs Mesh Bridge" -srcfolder "$staging" \
              -fs HFS+ -format UDZO -ov "out/${{ matrix.asset }}"
          else
            cp "dist/${{ matrix.bin }}" "out/${{ matrix.asset }}"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

      - name: Attach to Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
          fail_on_unmatched_files: true
