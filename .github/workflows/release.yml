name: Build desktop apps

# Builds the siliqs-mesh-bridge desktop app for Windows / macOS / Linux.
# GitHub Actions is used ONLY as the multi-OS build farm (PyInstaller can't cross-compile) —
# it does NOT store any cloud credentials. The three binaries are uploaded as workflow
# artifacts; you publish them to https://siliqs.net/downloads/ from your own machine with
#   ./publish-downloads.sh <tag>
# (the `siliqs` AWS creds stay in 1Password, never in GitHub). See publish-downloads.sh.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: siliqs-mesh-bridge-linux-x86_64
            bin: siliqs-mesh-bridge
          - os: windows-latest
            asset: siliqs-mesh-bridge-windows-x86_64.exe
            bin: siliqs-mesh-bridge.exe
          - os: macos-latest
            asset: siliqs-mesh-bridge-macos-arm64.dmg
            bin: siliqs-mesh-bridge
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install "." pyinstaller

      - name: Build
        run: pyinstaller --noconfirm siliqs-mesh-bridge.spec

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "macOS" ]; then
            # Build a .dmg with the classic drag-to-Applications layout. hdiutil (no
            # Finder/AppleScript) is reliable on the headless CI runner: a staging folder
            # holding the .app + an "Applications" symlink → a compressed (UDZO) image.
            staging="$(mktemp -d)"
            cp -R "dist/siliqs-mesh-bridge.app" "$staging/"
            ln -s /Applications "$staging/Applications"
            hdiutil create -volname "Siliqs Mesh Bridge" -srcfolder "$staging" \
              -fs HFS+ -format UDZO -ov "out/${{ matrix.asset }}"
          else
            cp "dist/${{ matrix.bin }}" "out/${{ matrix.asset }}"
          fi

      # No cloud credentials in CI: just publish the binary as a workflow artifact.
      # `./publish-downloads.sh <tag>` (run on your machine) pulls these and pushes to S3.
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}
