name: Build desktop apps

# Builds the siliqs-mesh-bridge desktop app for Windows / macOS / Linux.
# GitHub Actions is used ONLY as the multi-OS build farm (PyInstaller can't cross-compile).
# Distribution is on siliqs.net, NOT GitHub Releases:
# - push a tag  v*   → builds all three and publishes to s3://siliqs-net-site-test/downloads/
#                      (served at https://siliqs.net/downloads/… — reachable in China, unlike GitHub)
# - manual run  (workflow_dispatch) → builds all three, uploads as workflow artifacts only
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY  — an IAM user that can put to the bucket
#   + create CloudFront invalidations (the `siliqs-deploy` keys work; a scoped CI user is better).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: siliqs-mesh-bridge-linux-x86_64
            bin: siliqs-mesh-bridge
          - os: windows-latest
            asset: siliqs-mesh-bridge-windows-x86_64.exe
            bin: siliqs-mesh-bridge.exe
          - os: macos-latest
            asset: siliqs-mesh-bridge-macos-arm64.dmg
            bin: siliqs-mesh-bridge
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install "." pyinstaller

      - name: Build
        run: pyinstaller --noconfirm siliqs-mesh-bridge.spec

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p out
          if [ "${{ runner.os }}" = "macOS" ]; then
            # Build a .dmg with the classic drag-to-Applications layout. hdiutil (no
            # Finder/AppleScript) is reliable on the headless CI runner: a staging folder
            # holding the .app + an "Applications" symlink → a compressed (UDZO) image.
            staging="$(mktemp -d)"
            cp -R "dist/siliqs-mesh-bridge.app" "$staging/"
            ln -s /Applications "$staging/Applications"
            hdiutil create -volname "Siliqs Mesh Bridge" -srcfolder "$staging" \
              -fs HFS+ -format UDZO -ov "out/${{ matrix.asset }}"
          else
            cp "dist/${{ matrix.bin }}" "out/${{ matrix.asset }}"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

      - name: Publish to siliqs.net/downloads (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          # stable, unversioned filenames → the URL always points at the latest build
          aws s3 cp "out/${{ matrix.asset }}" "s3://siliqs-net-site-test/downloads/${{ matrix.asset }}" \
            --content-type application/octet-stream --cache-control "public, max-age=300"
          aws cloudfront create-invalidation --distribution-id EICN3L9GA5F65 \
            --paths "/downloads/${{ matrix.asset }}"
          echo "→ https://siliqs.net/downloads/${{ matrix.asset }}"
